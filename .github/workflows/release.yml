name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix binary
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          package="scel2rime-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "$package"
          cp "target/${{ matrix.target }}/release/scel2rime" "$package/"
          cp README.md LICENSE-MIT UNLICENSE scel2rime.conf "$package/" 2>/dev/null || true
          tar -czf "$package.tar.gz" "$package"

      - name: Package Windows binary
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          set -euo pipefail
          package="scel2rime-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "$package"
          cp "target/${{ matrix.target }}/release/scel2rime.exe" "$package/"
          cp README.md LICENSE-MIT UNLICENSE scel2rime.conf "$package/" 2>/dev/null || true
          powershell -NoProfile -Command "Compress-Archive -Path '$package' -DestinationPath '$package.zip'"

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: scel2rime-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" artifacts/* --repo "$GITHUB_REPOSITORY" --generate-notes --verify-tag
